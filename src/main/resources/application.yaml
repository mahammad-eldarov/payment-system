bank:
  card:
    min-balance: 10
    min-balance-currency: AZN
    number:
      prefix: "9988"
      total-length: 16
  account:
    min-balance: 5
    min-balance-currency: USD
    number:
      prefix: "2211"
      total-length: 18
  transaction:
    suspicious-threshold: 100
    suspicious-currency: AZN

scheduler:
  payment:
    cron: "10 23 00 * * *"
  card:
    cron: "50 33 01 * * *"
  currentAccount:
    cron: "14 50 1 * * *"


