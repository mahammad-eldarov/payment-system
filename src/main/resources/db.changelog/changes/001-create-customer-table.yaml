databaseChangeLog:
  - changeSet:
      id: 001-create-customer-table
      author: Admin
      changes:
        - createTable:
            tableName: customer
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: customer_pkey

              - column:
                  name: is_visible
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp(6)
                  defaultValueComputed: now()

              - column:
                  name: updated_at
                  type: timestamp(6)

              - column:
                  name: email
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: name
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: phone_number
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: text
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

              - column:
                  name: surname
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: pin
                  type: varchar(7)
                  constraints:
                    nullable: false

        - sql:
            comment: "customer status check constraint"
            sql: >
              ALTER TABLE customer
              ADD CONSTRAINT customer_status_check
              CHECK (status = ANY (ARRAY['ACTIVE', 'SUSPICIOUS', 'BLOCKED', 'CLOSED']));

  - changeSet:
      id: 001-create-customer-constraint-table
      author: Admin
      changes:
        - sql:
            comment: "Partial unique index on customer.pin where is_visible = true"
            sql: >
              CREATE UNIQUE INDEX unique_pin_pk
              ON customer (pin)
              WHERE (is_visible = true);