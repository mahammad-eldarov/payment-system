databaseChangeLog:
  - changeSet:
      id: 002-create-card-table
      author: Admin
      changes:
        - createTable:
            tableName: card
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: card_pkey

              - column:
                  name: activation_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false

              - column:
                  name: customer_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: card_customer_id_fk
                    references: customer(id)

              - column:
                  name: expiry_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: is_visible
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp(6)
                  defaultValueComputed: now()

              - column:
                  name: updated_at
                  type: timestamp(6)

              - column:
                  name: pan
                  type: varchar(16)
                  constraints:
                    nullable: false

              - column:
                  name: cvv
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: text
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false

              - column:
                  name: card_name
                  type: varchar
                  constraints:
                    nullable: false

              - column:
                  name: card_holder_name
                  type: varchar
                  constraints:
                    nullable: false

              - column:
                  name: password
                  type: varchar(4)
                  constraints:
                    nullable: false

              - column:
                  name: card_type
                  type: text
                  constraints:
                    nullable: false

              - column:
                  name: card_brand
                  type: text
                  constraints:
                    nullable: false

        - sql:
            comment: "card currency check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT card_currency_check
              CHECK (currency = ANY (ARRAY['AZN', 'USD', 'EUR']));

        - sql:
            comment: "card status check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT card_status_check
              CHECK (status = ANY (ARRAY['ACTIVE', 'EXPIRED', 'CLOSED', 'BLOCKED', 'LOST', 'STOLEN', 'SUSPICIOUS']));

        - sql:
            comment: "card name check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT card_name_check
              CHECK (card_name = ANY (ARRAY['CASHBACK', 'PREMIUM']));

        - sql:
            comment: "password format check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT password_check
              CHECK (password ~ '^[0-9]{4}$');

        - sql:
            comment: "card type check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT card_type_check
              CHECK (card_type = ANY (ARRAY['DEBIT', 'CREDIT']));

        - sql:
            comment: "card brand check constraint"
            sql: >
              ALTER TABLE card
              ADD CONSTRAINT card_brand_check
              CHECK (card_brand = ANY (ARRAY['VISA', 'MASTERCARD']));