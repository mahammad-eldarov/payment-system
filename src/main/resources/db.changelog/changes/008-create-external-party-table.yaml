databaseChangeLog:
  - changeSet:
      id: 008-create-external-party-table
      author: Admin
      changes:
        - createTable:
            tableName: external_party
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: external_bank_accounts_pkey

              - column:
                  name: bank_code
                  type: varchar(10)
                  constraints:
                    nullable: false

              - column:
                  name: bank_name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: full_name
                  type: varchar(100)
                  constraints:
                    nullable: false

              - column:
                  name: card_number
                  type: varchar(16)

              - column:
                  name: account_number
                  type: varchar(20)

              - column:
                  name: phone
                  type: varchar(15)

              - column:
                  name: email
                  type: varchar(100)

              - column:
                  name: pin
                  type: varchar(4)

              - column:
                  name: source_type
                  type: varchar(20)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()

              - column:
                  name: updated_at
                  type: timestamp