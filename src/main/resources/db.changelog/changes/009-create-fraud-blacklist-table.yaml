databaseChangeLog:
  - changeSet:
      id: 009-create-fraud-blacklist-table
      author: Admin
      changes:
        - createTable:
            tableName: fraud_blacklist
            columns:
              - column:
                  name: id
                  type: serial
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: fraud_blacklist_pk

              - column:
                  name: pin
                  type: varchar
                  constraints:
                    nullable: false

              - column:
                  name: phone_number
                  type: varchar

              - column:
                  name: email
                  type: varchar

              - column:
                  name: reason
                  type: varchar
                  constraints:
                    nullable: false

              - column:
                  name: blacklisted_at
                  type: timestamp
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()

              - column:
                  name: updated_at
                  type: timestamp